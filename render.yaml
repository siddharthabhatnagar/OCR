# Render Blueprint — one-click deploy
# After pushing this repo to GitHub, go to:
#   https://dashboard.render.com/blueprints
# and connect your repo. Render will read this file automatically.

services:
  - type: web
    name: paddle-ocr-table
    runtime: docker
    # Plan options:
    #   free    — 512 MB RAM, 0.1 CPU, sleeps after 15 min idle. $0/mo.
    #             PaddleOCR is borderline at 512 MB. Will work for small
    #             images (<1 MB, simple tables). Will OOM on large/complex ones.
    #   starter — 512 MB RAM, 0.1 CPU, no sleep. $7/mo. Same memory as free.
    #   standard — 2 GB RAM, 0.5 CPU. $25/mo. Recommended for real use.
    #
    # We default to "free" since you explicitly requested it. If you hit OOM
    # errors, bump to "standard".
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: PADDLE_LANG
        value: en
      # Memory optimization — return freed memory to OS
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
      # Optional: restrict CORS to your Vercel frontend URL
      # - key: CORS_ORIGINS
      #   value: https://your-app.vercel.app
